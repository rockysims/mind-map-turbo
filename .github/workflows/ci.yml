name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same branch/PR when new commits land.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · check · test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/mind-map-sv/pnpm-lock.yaml', 'pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter mind-map-sv exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter mind-map-sv exec playwright install-deps chromium

      # The three Definition of Done gates from .cursor/rules/core.mdc.
      - name: Lint (prettier + eslint)
        run: pnpm --filter mind-map-sv lint

      - name: Type check (svelte-check)
        run: pnpm --filter mind-map-sv check

      - name: Tests (vitest: server + client + storybook)
        run: pnpm --filter mind-map-sv test:unit -- --run
